<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>
  <!-- Background tile, fully opaque -->
  <rect x="0" y="0" width="64" height="64" rx="13" ry="13" fill="#1a1b26"/>
  <!--
    Greek psi drawn as a single bold filled shape (not strokes).
    Filled shapes survive aggressive downscaling far better than thin
    strokes. Thicker arms, slightly wider stem, and we drop the
    decorative inner border + glow because they vanish at 32x32 anyway.
  -->
  <g fill="url(#g)">
    <!-- Vertical stem: rounded rectangle from y=10 to y=58, 8px wide -->
    <rect x="28" y="10" width="8" height="48" rx="4" ry="4"/>
    <!-- Left arm: rounded rectangle rotated about its base -->
    <rect x="10" y="14" width="8" height="22" rx="4" ry="4"/>
    <!-- Right arm: mirror of left -->
    <rect x="46" y="14" width="8" height="22" rx="4" ry="4"/>
    <!-- Horizontal connector at the base of the U (joins all three) -->
    <rect x="10" y="32" width="44" height="8" rx="4" ry="4"/>
  </g>
</svg>
