<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>
  <!-- Background tile -->
  <rect x="0" y="0" width="64" height="64" rx="13" ry="13" fill="#1a1b26"/>
  <!--
    Greek varphi (phi) drawn as a bold solid stem + thick hollow ellipse.
    Both shapes use ~7-8 unit thickness in this 64-viewBox so they
    stay >=3px even when downscaled to 32x32 for the Windows taskbar.
  -->
  <!-- Hollow loop: ellipse with thick stroke. Stroke-width 7 -> ~3.5px at 32x32 -->
  <ellipse cx="32" cy="32" rx="20" ry="12" fill="none" stroke="url(#g)" stroke-width="7"/>
  <!-- Vertical stem: filled rectangle, full height, slight rounding -->
  <rect x="28" y="6" width="8" height="52" rx="4" ry="4" fill="url(#g)"/>
</svg>
